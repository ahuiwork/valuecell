name: 打包 ValueCell 一体化镜像

on:
  workflow_dispatch: # 手动触发

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 登录 GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 构建并推送
        uses: docker/build-push-action@v5
        with:
          # ★★★ 设为根目录，让 Docker 能同时拿到 frontend 和 python 文件夹 ★★★
          context: .
          # ★★★ 严格指定 Dockerfile 的路径和大小写 ★★★
          file: docker/Dockerfile 
          push: true
          # 强制转换为小写，防止因为用户名大写导致权限报错
          tags: ghcr.io/${{ github.repository_owner }}/valuecell:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
