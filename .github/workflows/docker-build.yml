name: 打包 ValueCell 一体化镜像

on:
  workflow_dispatch: # 手动触发

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 登录 GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 构建并推送
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile 
          push: true
          # ★★★ 重点：同时保留 latest 和 run_number 标签 ★★★
          tags: |
            ghcr.io/${{ github.repository_owner }}/valuecell:latest
            ghcr.io/${{ github.repository_owner }}/valuecell:${{ github.run_number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
